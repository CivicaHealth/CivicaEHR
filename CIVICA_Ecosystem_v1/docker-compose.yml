services:
  db:
    image: postgres:16-alpine
    container_name: civica-dev-db
    environment:
      POSTGRES_USER: civica
      POSTGRES_PASSWORD: civica
      POSTGRES_DB: civica_dev
    ports:
      - "54329:5432"
    volumes:
      - civica_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civica -d civica_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  civica_dev_pg:
